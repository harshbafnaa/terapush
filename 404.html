<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Page Not Found — Terapush</title>
  <meta name="robots" content="noindex"/>
  <meta name="description" content="Page not found. Navigate back to the Terapush startup ecosystem platform."/>
  <link rel="canonical" href="https://terapush.in/404.html"/>
  <meta property="og:title" content="Page Not Found — Terapush"/>
  <meta property="og:description" content="Page not found. Navigate back to the Terapush startup ecosystem platform."/>
  <meta property="og:image" content="https://terapush.in/images/og-image.png"/>
  <meta property="og:url" content="https://terapush.in/404.html"/>
  <meta property="og:type" content="website"/>
  <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@300;400;500;600;700;800;900&family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="shared.css"/>
  <link rel="icon" type="image/png" href="favicon.png">
  <style>
    .error-page {
      min-height: 100svh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 48px 24px;
      position: relative; overflow: hidden;
    }
    .error-page::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 40%, rgba(255,255,255,0.03) 0%, transparent 70%);
      pointer-events: none;
    }
    .error-code {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem; letter-spacing: 0.2em;
      color: var(--text3); margin-bottom: 32px;
    }
    .error-title {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(3rem, 8vw, 7rem);
      font-weight: 400; line-height: 1;
      letter-spacing: -0.03em; color: var(--text);
      margin-bottom: 24px;
    }
    .error-title em { font-style: italic; color: var(--text2); }
    .error-desc {
      font-size: 1rem; color: var(--text2);
      line-height: 1.7; max-width: 400px;
      margin: 0 auto 48px; font-weight: 300;
    }
    .error-links {
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap; justify-content: center;
    }
    .error-link-primary {
      display: inline-block; padding: 13px 32px;
      background: var(--cta-bg); color: var(--cta-text);
      font-family: 'League Spartan', sans-serif;
      font-size: 0.78rem; font-weight: 600;
      letter-spacing: 0.14em; text-transform: uppercase;
      border-radius: 100px; text-decoration: none;
      transition: opacity 0.2s;
    }
    .error-link-primary:hover { opacity: 0.85; }
    .error-link-secondary {
      display: inline-block; padding: 12px 24px;
      color: var(--text2); border: 1px solid var(--border2);
      font-family: 'League Spartan', sans-serif;
      font-size: 0.78rem; font-weight: 500;
      letter-spacing: 0.1em; text-transform: uppercase;
      border-radius: 100px; text-decoration: none;
      transition: color 0.2s, border-color 0.2s;
    }
    .error-link-secondary:hover { color: var(--text); border-color: var(--text3); }
    .error-nav {
      display: flex; align-items: center; gap: 24px;
      margin-top: 64px; flex-wrap: wrap; justify-content: center;
    }
    .error-nav a {
      font-size: 0.72rem; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--text3); text-decoration: none; transition: color 0.2s;
    }
    .error-nav a:hover { color: var(--text2); }
  </style>
</head>
<body>
  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <div class="error-page">
    <div class="error-code">404 — Page not found</div>
    <h1 class="error-title">Lost in the<br/><em>ecosystem.</em></h1>
    <p class="error-desc">This page doesn't exist or may have moved. Let's get you back on track.</p>
    <div class="error-links">
      <a href="index.html" class="error-link-primary">Go home</a>
      <a href="blog.html" class="error-link-secondary">Read the blog</a>
    </div>
    <nav class="error-nav">
      <a href="about.html">About</a>
      <a href="services.html">Services</a>
      <a href="readiness.html">Readiness</a>
      <a href="pitch.html">Pitch Us</a>
      <a href="careers.html">Careers</a>
    </nav>
  </div>

  <script data-cfasync="false" src="shared.js"></script>
</body>
</html>
